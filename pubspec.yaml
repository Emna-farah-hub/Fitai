name: fitai
description: "FitAI - Your AI-powered nutrition coaching app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5

  # State Management
  provider: ^6.1.2

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0+3

  # Navigation
  go_router: ^14.8.1

  # Animation & Charts
  flutter_animate: ^4.5.2
  percent_indicator: ^4.2.4
  fl_chart: ^0.70.2
  iconsax_flutter: ^1.0.0+1

  # AI
  google_generative_ai: ^0.4.3
  flutter_local_notifications: ^17.0.0

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/common_foods.json
    - assets/Tunisian_meals.json
    - assets/swipe_meals.json
    - assets/meal_images/
    - assets/illustrations/
    - assets/images/
    - assets/icons/
