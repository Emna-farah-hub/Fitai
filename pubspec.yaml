name: fitai
description: "FitAI - Your AI-powered nutrition coaching app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.5

  # State Management
  provider: ^6.1.2

  # UI / Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0+3

  # Navigation
  go_router: ^14.8.1

  # Utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # assets:          # Uncomment and add image assets here in Sprint 2
  #   - assets/images/
  #   - assets/icons/
